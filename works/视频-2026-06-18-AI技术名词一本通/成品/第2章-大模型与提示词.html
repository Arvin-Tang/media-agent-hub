<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第2章 · 大模型与提示词</title>
<style>
:root {
  --shell: #e8e8e6; --surface: #fafaf8; --text: #0a0a0a; --text-mute: #737373;
  --accent: #002fa7; --accent-soft: rgba(0,47,167,0.08);
  --accent-glow: rgba(0,47,167,0.35);
  --font-cn: "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  --font-mono: "JetBrains Mono","SF Mono","Consolas",monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html,body { width:100%; height:100%; overflow:hidden; background:#000; }
body { display:flex; align-items:center; justify-content:center; font-family:var(--font-cn); }
.stage {
  width: min(100vw, 177.78vh); height: min(100vh, 56.25vw);
  background: var(--surface); position: relative; overflow: hidden; cursor: pointer;
  box-shadow: 0 20px 80px rgba(0,0,0,0.5);
}
.stage::after {
  content:""; position:absolute; inset:0; pointer-events:none; z-index:1;
  background-image: linear-gradient(rgba(10,10,10,0.045) 1px, transparent 1px),
    linear-gradient(90deg,rgba(10,10,10,0.045) 1px, transparent 1px);
  background-size: 64px 64px;
}
.scene { position:absolute; inset:0; z-index:2; }
.fade-in { animation: fi 0.6s ease-out both; }
@keyframes fi { from { opacity:0; transform:scale(.96) } to { opacity:1; transform:scale(1) } }
.slide-up { animation: su 0.5s ease-out both; }
@keyframes su { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
.slide-in { animation: si 0.5s ease-out both; }
@keyframes si { from { opacity:0; transform:translateX(-30px) } to { opacity:1; transform:translateX(0) } }
.progress-wrap { position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:center; z-index:10; pointer-events:none; height:32px; }
.progress { display:flex; gap:4px; align-items:center; opacity:0.4; }
.dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.3); transition:all .2s; }
.dot.cur { background:var(--accent); transform:scale(1.3); }
.dot.done { background:rgba(0,47,167,.5); }
.step-info { position:fixed; top:12px; right:12px; z-index:10; font-family:var(--font-mono); font-size:11px; color:rgba(255,255,255,.4); }

.controls {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20;
  display: flex; gap: 12px; align-items: center; pointer-events: auto;
}
.controls button {
  background: rgba(0,0,0,0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 8px;
  padding: 8px 20px; font-size: 14px; cursor: pointer; transition: all .2s;
  font-family: var(--font-body, "PingFang SC", sans-serif);
}
.controls button:hover { background: rgba(0,47,167,0.5); border-color: var(--accent); }
.controls button:disabled { opacity: 0.3; cursor: not-allowed; }
.play-indicator { font-size: 12px; color: rgba(255,255,255,0.5); margin-left: 8px; }
.subtitle-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 15;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 40px 40px 16px; text-align: center; pointer-events: none;
}
.subtitle-text { color: #fff; font-size: 22px; font-weight: 600; text-shadow: 0 0 20px rgba(0,0,0,0.8); opacity: 0; transition: opacity .3s; }
.subtitle-text.show { opacity: 1; }
</style>
</head>
<body>
<div class="stage" id="stage"><div class="scene" id="scene"></div></div>
<div class="progress-wrap"><div class="progress" id="progress"></div></div>
<div class="step-info" id="stepInfo"></div>

<script>
const STEPS = 2;

let isPlaying = false;
let playTimer = null;
let isMuted = false;
let synth = window.speechSynthesis;
let isMuted = false;

function showSubtitle(text) {
  var el = document.getElementById('subtitle');
  if (!el) return;
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}
function hideSubtitle() {
  var el = document.getElementById('subtitle');
  if (el) el.classList.remove('show');
}
function speak(text) {
  if (isMuted) return;
  if (synth.speaking) synth.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1.0; u.pitch = 1.0;
  var zhVoice = synth.getVoices().find(function(v) { return v.lang.startsWith('zh'); });
  if (zhVoice) u.voice = zhVoice;
  synth.speak(u);
}
function stopSpeak() { if (synth.speaking) synth.cancel(); }

function startAutoPlay() {
  if (isPlaying) return;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ 暂停';
  document.getElementById('statusText').textContent = '自动播放中...';
  autoNext();
}
function stopAutoPlay() {
  isPlaying = false;
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  var btn = document.getElementById('playBtn');
  if (btn) btn.textContent = '▶ 自动播放';
  document.getElementById('statusText').textContent = '点击或按 → 推进';
}
function autoNext() {
  if (!isPlaying) return;
  if (step < STEPS - 1) {
    var checkSpeech = function() {
      if (!synth.speaking) {
        playTimer = setTimeout(function() {
          goNext();
          var waists = [6,5,7];
          var waitMs = (step < waists.length) ? waists[step] * 1000 : 5000;
          playTimer = setTimeout(autoNext, waitMs);
        }, 1200);
      } else {
        playTimer = setTimeout(checkSpeech, 200);
      }
    };
    checkSpeech();
  } else {
    stopAutoPlay();
    document.getElementById('statusText').textContent = '播放完毕 ✓';
    document.getElementById('playBtn').textContent = '↻ 重播';
  }
}

synth.getVoices();

const NARRATIONS = [
    "可以把大语言模型理解成一个读了全人类知识的天才实习生。但再天才的实习生也有三个致命弱点：第一，知识截止日期，训练完就停在当天。第二，幻觉，不懂也硬编答案。第三，无法操作外部系统，不能查数据库、不能点按钮。注意，后面讲的所有技术，都是在补这三个窟窿。",
    "提示词工程，Prompt Engineering，就是你跟 AI 说话的方式。同一个人说同一句话，讲清楚了和讲不清楚，AI 给出的是完全不同的东西。差的 Prompt 就像说写一篇文章，AI 给你一堆废话。好的 Prompt 会给角色、受众、格式、风格，AI 直接产出可用的内容。2026 年推理模型的进步让 Prompt 门槛降低了，但这个思路依然好用。"
]; // TODO: 填入每步台词
const SUBTITLES = [
    "大语言模型像天才实习生，但有三个致命弱点",
    "提示词工程就是跟 AI 说话的方式，讲清楚才有好答案"
]; // TODO: 填入每步字幕
let step = 0;

function renderScene() {
  const el = document.getElementById('scene');
  document.getElementById('stepInfo').textContent = `${step+1}/${STEPS}`;

  if (step === 0) {
    el.innerHTML = `
      <div class="fade-in" style="position:absolute;inset:0;display:flex;align-items:center;gap:60px;padding:80px 100px;">
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="width:180px;height:180px;border-radius:50%;background:var(--accent-soft);border:4px solid var(--accent);display:flex;align-items:center;justify-content:center;position:relative;">
            <span style="font-size:80px;">🧠</span>
            <div style="position:absolute;top:-10px;right:-10px;width:40px;height:40px;border-radius:50%;background:#FFD700;box-shadow:0 0 20px #FFD70088;display:flex;align-items:center;justify-content:center;font-size:20px;">⭐</div>
          </div>
          <div style="background:var(--accent);color:#fff;padding:6px 24px;border-radius:4px;font-size:16px;font-family:var(--font-mono);letter-spacing:.1em;">INTERN 实习生</div>
          <div style="font-size:32px;font-weight:700;color:var(--text);margin-top:6px;">天才实习生</div>
          <div style="font-size:16px;color:var(--text-mute);text-align:center;line-height:1.7;max-width:320px;">
            读了全人类的知识<br>
            但刚入职，不懂公司的具体流程
          </div>
          <div style="font-size:14px;color:var(--accent);font-weight:600;margin-top:8px;background:var(--accent-soft);padding:8px 16px;border-radius:8px;">
            GPT · Claude · DeepSeek · Gemini 都叫 LLM
          </div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:24px;">
          <div style="font-size:20px;font-weight:600;color:var(--text-mute);letter-spacing:.1em;text-transform:uppercase;font-family:var(--font-mono);margin-bottom:8px;">三个致命弱点</div>
          ${[
            ['知识截止日期','训练完就停在那一天了。问它昨天的新闻、最新的研究，它一概不知。','训练完就停在当天'],
            ['幻觉','不懂也硬编答案，而且说得跟真的一样。它不是在骗你——它是真的不知道自己不知道。','出现'一本正经胡说八道''],
            ['无法操作外部系统','不能查数据库、不能点按钮、不能发邮件。它只能聊天框里打字给你看。','不能查数据库不能点按钮']
          ].map((l,i) => `
            <div class="slide-in" style="display:flex;align-items:flex-start;gap:16px;animation-delay:${i*0.35}s">
              <div style="width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:14px;font-weight:700;flex-shrink:0;">${i+1}</div>
              <div>
                <div style="font-size:24px;font-weight:600;color:var(--text);">${l[0]}</div>
                <div style="font-size:15px;color:var(--text-mute);margin-top:4px;line-height:1.5;">${l[1]}</div>
                <div style="font-size:13px;color:var(--text-faint);margin-top:2px;font-style:italic;">${l[2]}</div>
              </div>
            </div>
          `).join('')}
          <div class="slide-up" style="margin-top:16px;padding:16px 24px;background:var(--accent-soft);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;font-size:16px;color:var(--text-2);line-height:1.6;animation-delay:1.2s;">
            <strong>后面讲的所有技术，都是在补这三个窟窿。</strong><br>
            注意：这些技术都是跑在 LLM 之上的——不是替代大模型，而是给它建一个完整系统。
          </div>
        </div>
      </div>`;
  } else if (step === 1) {
    el.innerHTML = `
      <div class="fade-in" style="position:absolute;inset:0;display:flex;flex-direction:column;padding:70px 90px;">
        <div style="font-size:18px;font-family:var(--font-mono);color:var(--text-mute);margin-bottom:20px;">Prompt Engineering · 提示词工程</div>
        <div style="font-size:15px;color:var(--text-2);margin-bottom:28px;line-height:1.6;">
          同一句话，AI 不一定给出同样的答案。不是 AI 不聪明，是你没说明白。<br>
          2023 年这是个很火的专职岗位，不过这两年推理模型（如 DeepSeek R1）让门槛大幅降低了。
        </div>
        <div style="display:flex;gap:40px;flex:1;">
          <div style="flex:1;display:flex;flex-direction:column;">
            <div style="font-size:15px;font-family:var(--font-mono);color:#c00;margin-bottom:12px;letter-spacing:.08em;">✗ 差 Prompt</div>
            <div style="background:#fff;border:2px solid #c00;border-radius:16px;padding:24px;flex:1;">
              <div style="font-size:22px;color:#c00;font-weight:700;margin-bottom:12px;">"写一篇文章"</div>
              <div style="width:100%;height:3px;background:#c0015;margin:12px 0;border-radius:2px;"></div>
              <div style="color:var(--text-mute);font-size:16px;line-height:1.9;">
                这是一个非常广阔的话题。在人类历史上，文章扮演了重要角色。从古至今，无数文人墨客通过文字记录思想、传播知识、表达情感……
              </div>
              <div style="color:#c00;font-size:14px;margin-top:16px;">→ 几百字废话，没法直接用</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;flex:0 0 60px;text-align:center;">
            <div style="font-size:36px;color:var(--accent);font-weight:200;">→</div>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;">
            <div style="font-size:15px;font-family:var(--font-mono);color:var(--accent);margin-bottom:12px;letter-spacing:.08em;">✓ 好 Prompt</div>
            <div style="background:#fff;border:2px solid var(--accent);border-radius:16px;padding:24px;flex:1;">
              <div style="font-size:20px;color:var(--accent);font-weight:600;margin-bottom:12px;">
                "你是一名科技博主，<br>面向完全不懂技术的普通人，<br>800字，用比喻，轻松一点"
              </div>
              <div style="width:100%;height:3px;background:var(--accent-soft);margin:12px 0;border-radius:2px;"></div>
              <div style="color:var(--text-2);font-size:16px;line-height:1.9;">
                如果你觉得 AI 现在满嘴术语听不懂，别急——今天我用做饭来比喻，把这些概念一个一个讲清楚。首先你要知道，每个 AI 背后都藏着一个被强迫读了全人类知识的天才实习生……
              </div>
              <div style="color:var(--accent);font-size:14px;margin-top:16px;">→ 风格明确，直接可用 ✅</div>
            </div>
          </div>
        </div>
        <div class="slide-up" style="margin-top:16px;padding:14px 20px;background:#f0f5ff;border-radius:8px;font-size:15px;color:var(--text-2);line-height:1.6;animation-delay:.4s;">
          <strong>核心要点</strong>：明确的角色 + 受众 + 格式 + 风格 = 好 Prompt。<br>
          <span style="color:var(--text-mute);">2026 年推理模型的进步让 Prompt 门槛降低，但思路依然有用——你越说明白，AI 越少犯错。</span>
        </div>
      </div>`;
  }
  renderDots();
}

function renderDots() {
  document.getElementById('progress').innerHTML = Array.from({length:STEPS}, (_,i) =>
    `<div class="dot ${i===step?'cur':i<step?'done':''}"></div>`
  ).join('');
}
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); if (isPlaying) stopAutoPlay(); if (step<STEPS-1) { step++; renderScene(); } }
  if (e.key==='ArrowLeft'||e.key==='Backspace') { e.preventDefault(); if (isPlaying) stopAutoPlay(); stopSpeak(); if (step>0) { step--; renderScene(); } hideSubtitle(); }
});
document.getElementById('stage').addEventListener('click', function() { if (step<STEPS-1) { if (isPlaying) stopAutoPlay(); step++; renderScene(); } });
setTimeout(function() {
  var pb = document.getElementById('playBtn');
  var mb = document.getElementById('muteBtn');
  if (pb) pb.addEventListener('click', function(e) {
    e.stopPropagation();
    if (pb.textContent.indexOf('↻') >= 0) { step = 0; stopSpeak(); renderScene(); renderDots(); hideSubtitle(); startAutoPlay(); return; }
    if (isPlaying) stopAutoPlay(); else startAutoPlay();
  });
  if (mb) mb.addEventListener('click', function(e) {
    e.stopPropagation();
    isMuted = !isMuted;
    if (isMuted) { stopSpeak(); mb.textContent = '🔇 静音'; }
    else { mb.textContent = '🔊 语音'; }
  });
  if (NARRATIONS[0]) { setTimeout(function() { showSubtitle(SUBTITLES[0] || ''); }, 500); }
}, 100);
renderScene();
</script>
</body>
</html>
