<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第5章 · RLHF · 多模态</title>
<style>
:root {
  --shell:#e8e8e6;--surface:#fafaf8;--text:#0a0a0a;--text-2:#2a2a2a;--text-mute:#737373;
  --accent:#002fa7;--accent-soft:rgba(0,47,167,.08);--accent-glow:rgba(0,47,167,.35);
  --green:#16a34a;--green-soft:rgba(22,163,74,.08);
  --orange:#ea580c;--orange-soft:rgba(234,88,12,.08);
  --font-cn:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  --font-mono:"JetBrains Mono","SF Mono","Consolas",monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{display:flex;align-items:center;justify-content:center;font-family:var(--font-cn);}
.stage{width:min(100vw,177.78vh);height:min(100vh,56.25vw);background:var(--surface);position:relative;overflow:hidden;cursor:pointer;box-shadow:0 20px 80px #00000080;}
.stage::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;background-image:linear-gradient(rgba(10,10,10,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(10,10,10,.045) 1px,transparent 1px);background-size:64px;}
.scene{position:absolute;inset:0;z-index:2;}
.fade-in{animation:fi .5s ease-out both;}@keyframes fi{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.slide-up{animation:su .5s ease-out both;}@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.slide-in{animation:si .5s ease-out both;}@keyframes si{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
.progress-wrap{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;z-index:10;pointer-events:none;height:32px;}
.progress{display:flex;gap:4px;align-items:center;opacity:.4;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .2s;}
.dot.cur{background:var(--accent);transform:scale(1.3);}
.dot.done{background:rgba(0,47,167,.5);}
.step-info{position:fixed;top:12px;right:12px;z-index:10;font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.4);}

.controls {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20;
  display: flex; gap: 12px; align-items: center; pointer-events: auto;
}
.controls button {
  background: rgba(0,0,0,0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 8px;
  padding: 8px 20px; font-size: 14px; cursor: pointer; transition: all .2s;
  font-family: var(--font-body, "PingFang SC", sans-serif);
}
.controls button:hover { background: rgba(0,47,167,0.5); border-color: var(--accent); }
.controls button:disabled { opacity: 0.3; cursor: not-allowed; }
.play-indicator { font-size: 12px; color: rgba(255,255,255,0.5); margin-left: 8px; }
.subtitle-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 15;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 40px 40px 16px; text-align: center; pointer-events: none;
}
.subtitle-text { color: #fff; font-size: 22px; font-weight: 600; text-shadow: 0 0 20px rgba(0,0,0,0.8); opacity: 0; transition: opacity .3s; }
.subtitle-text.show { opacity: 1; }
</style>
</head>
<body>
<div class="stage" id="stage"><div class="scene" id="scene"></div></div>
<div class="progress-wrap"><div class="progress" id="progress"></div></div>
<div class="step-info" id="stepInfo"></div>

<script>
const STEPS = 2;

let isPlaying = false;
let playTimer = null;
let isMuted = false;
let synth = window.speechSynthesis;
let isMuted = false;

function showSubtitle(text) {
  var el = document.getElementById('subtitle');
  if (!el) return;
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}
function hideSubtitle() {
  var el = document.getElementById('subtitle');
  if (el) el.classList.remove('show');
}
function speak(text) {
  if (isMuted) return;
  if (synth.speaking) synth.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1.0; u.pitch = 1.0;
  var zhVoice = synth.getVoices().find(function(v) { return v.lang.startsWith('zh'); });
  if (zhVoice) u.voice = zhVoice;
  synth.speak(u);
}
function stopSpeak() { if (synth.speaking) synth.cancel(); }

function startAutoPlay() {
  if (isPlaying) return;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ 暂停';
  document.getElementById('statusText').textContent = '自动播放中...';
  autoNext();
}
function stopAutoPlay() {
  isPlaying = false;
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  var btn = document.getElementById('playBtn');
  if (btn) btn.textContent = '▶ 自动播放';
  document.getElementById('statusText').textContent = '点击或按 → 推进';
}
function autoNext() {
  if (!isPlaying) return;
  if (step < STEPS - 1) {
    var checkSpeech = function() {
      if (!synth.speaking) {
        playTimer = setTimeout(function() {
          goNext();
          var waists = [6,5,7];
          var waitMs = (step < waists.length) ? waists[step] * 1000 : 5000;
          playTimer = setTimeout(autoNext, waitMs);
        }, 1200);
      } else {
        playTimer = setTimeout(checkSpeech, 200);
      }
    };
    checkSpeech();
  } else {
    stopAutoPlay();
    document.getElementById('statusText').textContent = '播放完毕 ✓';
    document.getElementById('playBtn').textContent = '↻ 重播';
  }
}

synth.getVoices();

const NARRATIONS = [
    "RLHF，基于人类反馈的强化学习。大模型知识面很广，但它不知道什么该说什么不该说。用人类反馈来做强化学习，让 AI 生成多个答案，人类排序谁好谁差，AI 从排序中学习。2025 年升级版的 RLTF，用工具执行结果来反馈，代码编译通过就是好，报错就是不好，效率比人工排序高很多。",
    "多模态，AI 的五感。AI 不再只能处理文字，还能理解图片、音频、视频。2026 年的趋势是从能看懂向能理解进化。AI 看一张照片，不仅知道这是一只猫，还能理解猫很放松、阳光很好。"
]; // TODO: 填入每步台词
const SUBTITLES = [
    "RLHF：教 AI 价值观，好答案该什么样",
    "多模态：AI 的五感，从能看懂到能理解"
]; // TODO: 填入每步字幕
let step = 0;

function renderScene() {
  const el = document.getElementById('scene');
  document.getElementById('stepInfo').textContent = `${step+1}/${STEPS}`;

  if (step === 0) {
    el.innerHTML = `
      <div class="fade-in" style="padding:60px 80px;position:absolute;inset:0;">
        <div style="font-size:18px;font-family:var(--font-mono);color:var(--text-mute);margin-bottom:4px;">RLHF · Reinforcement Learning from Human Feedback</div>
        <div style="font-size:32px;font-weight:700;margin-bottom:12px;color:var(--text);">
          <span style="background:var(--accent);color:#fff;border-radius:6px;padding:0 14px;font-size:18px;font-family:var(--font-mono);margin-right:12px;">RLHF</span>
          基于人类反馈的强化学习
        </div>
        <div style="font-size:16px;color:var(--text-2);margin-bottom:24px;line-height:1.7;max-width:660px;">
          <strong>为什么需要 RLHF？</strong> 大模型知识面很广，但它不知道什么该说什么不该说。<br>
          用人类反馈来做强化学习——教 AI 价值观。简单来说：让 AI 生成多个答案，人类排序谁好谁差，AI 从排序中学习。
        </div>
        <div style="display:flex;align-items:center;gap:24px;justify-content:center;margin-bottom:28px;">
          <div style="text-align:center;">
            <div style="font-size:40px;margin-bottom:6px;">🤖</div>
            <div style="font-size:15px;color:var(--text-2);line-height:1.5;">AI 生成<br>多个答案</div>
          </div>
          <span style="font-size:28px;color:var(--accent);">→</span>
          <div style="text-align:center;">
            <div style="font-size:40px;margin-bottom:6px;">👤</div>
            <div style="font-size:15px;color:var(--text-2);line-height:1.5;">人类排序<br>打 ✓ 打 ✗</div>
          </div>
          <span style="font-size:28px;color:var(--accent);">→</span>
          <div style="text-align:center;">
            <div style="font-size:40px;margin-bottom:6px;">🧠</div>
            <div style="font-size:15px;color:var(--text-2);line-height:1.5;">AI 从排序<br>学习调整行为</div>
          </div>
        </div>
        <div style="display:flex;gap:20px;margin-bottom:24px;">
          <div style="flex:1;padding:18px;background:#f0fdf4;border:2px solid var(--green);border-radius:10px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
              <span style="font-size:22px;color:var(--green);">✓</span><span style="font-size:17px;font-weight:600;color:var(--green);">好答案</span>
            </div>
            <div style="font-size:14px;color:var(--text-2);line-height:1.7;">回答清晰、安全、有礼貌<br>AI 学到：这样是对的，以后多这样输出</div>
          </div>
          <div style="flex:1;padding:18px;background:#fef2f2;border:2px solid var(--orange);border-radius:10px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
              <span style="font-size:22px;color:var(--orange);">✗</span><span style="font-size:17px;font-weight:600;color:var(--orange);">差答案</span>
            </div>
            <div style="font-size:14px;color:var(--text-2);line-height:1.7;">带有偏见、编造事实<br>AI 学到：这样是错的，收敛行为</div>
          </div>
        </div>
        <div class="slide-up" style="padding:14px 20px;background:#f5f5f5;border-radius:8px;animation-delay:.4s;">
          <div style="font-size:15px;font-weight:600;margin-bottom:4px;">升级版：RLTF（2025 年推出）</div>
          <div style="font-size:14px;color:var(--text-mute);line-height:1.6;">用工具执行结果来反馈——不是等人排序，而是看代码能不能编译通过。<br>
          AI 写一段代码，编译通过就是好，报错就是不好。比人一条条排序，效率高了不知道多少倍。</div>
        </div>
      </div>`;
  } else if (step === 1) {
    el.innerHTML = `
      <div class="fade-in" style="position:absolute;inset:0;padding:60px 80px;">
        <div style="font-size:18px;font-family:var(--font-mono);color:var(--text-mute);margin-bottom:4px;">Multimodal · 多模态</div>
        <div style="font-size:32px;font-weight:700;margin-bottom:8px;color:var(--text);">
          <span style="background:var(--accent);color:#fff;border-radius:6px;padding:0 14px;font-size:18px;font-family:var(--font-mono);margin-right:12px;">MM</span>
          多模态 — AI 的五感
        </div>
        <div style="font-size:15px;color:var(--text-2);margin-bottom:24px;line-height:1.6;">
          AI 不再只能处理文字，还能理解图片、音频、视频。<br>
          2026 年的趋势是：从"能看懂"向"能理解"进化。
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:660px;margin:0 auto;">
          ${[
            {icon:'📝→🖼️',title:'文生图',desc:'文字描述直接生成图片。DALL·E、Midjourney 把一句话变成一张画。'},
            {icon:'🖼️→📝',title:'图生文',desc:'给一张图片，AI 自动写出描述。看照片不仅知道是猫，还能理解猫的状态。'},
            {icon:'🎤→💬',title:'语音交互',desc:'语音识别听明白你在说什么，再用语音合成说给你听。全双工对话已是标配。'},
            {icon:'🎬',title:'视频理解',desc:'看一段视频，理解其中发生了什么。比如监控识别异常行为、视频自动加字幕。'}
          ].map((c,i) => `
            <div class="slide-in" style="background:#fff;border:1px solid var(--rule);border-radius:12px;padding:22px;text-align:center;animation-delay:${i*0.15}s;">
              <div style="font-size:36px;margin-bottom:10px;">${c.icon}</div>
              <div style="font-size:20px;font-weight:700;margin-bottom:8px;color:var(--accent);">${c.title}</div>
              <div style="font-size:14px;color:var(--text-mute);line-height:1.6;">${c.desc}</div>
            </div>
          `).join('')}
        </div>
        <div class="slide-up" style="margin-top:20px;padding:14px 24px;background:var(--accent-soft);border-radius:8px;font-size:15px;color:var(--text-2);line-height:1.6;animation-delay:.7s;">
          <strong>2026 趋势</strong>：多模态从「能看懂」到「能理解」<br>
          <span style="font-size:14px;color:var(--text-mute);">AI 看一张照片，不仅知道这是一只猫，还能理解猫很放松、阳光很好——这种情绪和氛围的理解力是 2026 年的标志性突破。</span>
        </div>
      </div>`;
  }
  renderDots();
}

function renderDots() {
  document.getElementById('progress').innerHTML = Array.from({length:STEPS}, (_,i) =>
    `<div class="dot ${i===step?'cur':i<step?'done':''}"></div>`
  ).join('');
}
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); if (isPlaying) stopAutoPlay(); if (step<STEPS-1) { step++; renderScene(); } }
  if (e.key==='ArrowLeft'||e.key==='Backspace') { e.preventDefault(); if (isPlaying) stopAutoPlay(); stopSpeak(); if (step>0) { step--; renderScene(); } hideSubtitle(); }
});
document.getElementById('stage').addEventListener('click', function() { if (step<STEPS-1) { if (isPlaying) stopAutoPlay(); step++; renderScene(); } });
setTimeout(function() {
  var pb = document.getElementById('playBtn');
  var mb = document.getElementById('muteBtn');
  if (pb) pb.addEventListener('click', function(e) {
    e.stopPropagation();
    if (pb.textContent.indexOf('↻') >= 0) { step = 0; stopSpeak(); renderScene(); renderDots(); hideSubtitle(); startAutoPlay(); return; }
    if (isPlaying) stopAutoPlay(); else startAutoPlay();
  });
  if (mb) mb.addEventListener('click', function(e) {
    e.stopPropagation();
    isMuted = !isMuted;
    if (isMuted) { stopSpeak(); mb.textContent = '🔇 静音'; }
    else { mb.textContent = '🔊 语音'; }
  });
  if (NARRATIONS[0]) { setTimeout(function() { showSubtitle(SUBTITLES[0] || ''); }, 500); }
}, 100);
renderScene();
</script>
</body>
</html>
