<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第6章 · 厨房比喻总结</title>
<style>
:root {
  --shell:#e8e8e6;--surface:#fafaf8;--text:#0a0a0a;--text-2:#2a2a2a;--text-mute:#737373;--text-faint:#aaa;
  --accent:#002fa7;--accent-soft:rgba(0,47,167,.08);--accent-glow:rgba(0,47,167,.35);
  --font-cn:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  --font-mono:"JetBrains Mono","SF Mono","Consolas",monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{display:flex;align-items:center;justify-content:center;font-family:var(--font-cn);}
.stage{width:min(100vw,177.78vh);height:min(100vh,56.25vw);background:var(--surface);position:relative;overflow:hidden;box-shadow:0 20px 80px #00000080;}
.stage::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;background-image:linear-gradient(rgba(10,10,10,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(10,10,10,.045) 1px,transparent 1px);background-size:64px;}
.scene{position:absolute;inset:0;z-index:2;}
.fade-in{animation:fi .5s ease-out both;}@keyframes fi{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.slide-up{animation:su .5s ease-out both;}@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.controls {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20;
  display: flex; gap: 12px; align-items: center; pointer-events: auto;
}
.controls button {
  background: rgba(0,0,0,0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 8px;
  padding: 8px 20px; font-size: 14px; cursor: pointer; transition: all .2s;
  font-family: var(--font-cn);
}
.controls button:hover { background: rgba(0,47,167,0.5); border-color: var(--accent); }
.play-indicator { font-size: 12px; color: rgba(255,255,255,0.5); margin-left: 8px; }
.subtitle-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 15;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 40px 40px 16px; text-align: center; pointer-events: none;
}
.subtitle-text { color: #fff; font-size: 22px; font-weight: 600; text-shadow: 0 0 20px rgba(0,0,0,0.8); opacity: 0; transition: opacity .3s; }
.subtitle-text.show { opacity: 1; }
.progress-wrap{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;z-index:10;pointer-events:none;height:32px;}
.progress{display:flex;gap:4px;align-items:center;opacity:.4;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .2s;}
.dot.cur{background:var(--accent);transform:scale(1.3);}
.dot.done{background:rgba(0,47,167,.5);}
.step-info{position:fixed;top:12px;right:12px;z-index:10;font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.4);}
</style>
</head>
<body>
<div class="stage" id="stage"><div class="scene" id="scene"></div></div>

<div class="subtitle-bar">
  <div class="subtitle-text" id="subtitle"></div>
</div>
<div class="controls">
  <button id="playBtn">▶ 自动播放</button>
  <button id="muteBtn">🔊 语音</button>
  <span class="play-indicator" id="statusText">点击或按 → 逐个揭晓</span>
</div>
<div class="progress-wrap"><div class="progress" id="progress"></div></div>
<div class="step-info" id="stepInfo">1/10</div>

<script>
const ITEMS = [
  {icon:'🔪',cn:'万能菜刀',en:'LLM 大模型',desc:'最基础的工具'},
  {icon:'📝',cn:'临时备注',en:'Prompt 提示词',desc:'菜谱上的备注'},
  {icon:'📖',cn:'食谱书',en:'RAG 检索增强',desc:'随时翻资料'},
  {icon:'🤖',cn:'炒菜机器人',en:'Agent 智能体',desc:'自动完成操作'},
  {icon:'🔌',cn:'统一接口',en:'MCP 协议',desc:'厨具标准'},
  {icon:'🔧',cn:'专用刀片',en:'LoRA 适配',desc:'局部调整'},
  {icon:'🦾',cn:'机械手',en:'Function Calling',desc:'伸手拿佐料'},
  {icon:'👨‍🍳',cn:'送厨师进修',en:'Fine-tuning',desc:'深度学习'},
  {icon:'⭐',cn:'顾客反馈',en:'RLHF',desc:'教价值观'},
  {icon:'👀',cn:'厨师全感官',en:'多模态',desc:'又看又听又尝'}
];

// 每reveal一个的台词
const NARRATIONS = [
  "万能菜刀就是大语言模型，LLM，所有 AI 工具最基础的工具",
  "提示词 Prompt 就像菜谱上的临时备注，告诉 AI 你要什么口味",
  "RAG 检索增强生成就是做菜时随时翻食谱书，不知道就去查",
  "Agent 智能体就是炒菜机器人，给个菜谱它自己从头干到尾",
  "MCP 协议就像厨房的统一接口标准，USB-C 那样啥都能插",
  "LoRA 低秩适配是专用刀片，不动原菜刀只在刀刃上加一层",
  "Function Calling 是机械手，让 AI 动手拿佐料、开烤箱",
  "Fine-tuning 微调是把厨师送去进修，改整个人的手艺",
  "RLHF 靠人类反馈来教 AI 价值观，像顾客打分告诉厨师什么好吃",
  "多模态让 AI 有了五感，又看又听又尝，像厨师全感官在做饭"
];
const SUBTITLES = NARRATIONS;

let revealed = 0;
let isPlaying = false;
let playTimer = null;
let isMuted = false;
let synth = window.speechSynthesis;
synth.getVoices();

function showSubtitle(text) {
  const el = document.getElementById('subtitle');
  if (!el) return;
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}
function hideSubtitle() {
  const el = document.getElementById('subtitle');
  if (el) el.classList.remove('show');
}
function speak(text) {
  if (isMuted) return;
  if (synth.speaking) synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 1.0; u.pitch = 1.0;
  const zhVoice = synth.getVoices().find(v => v.lang.startsWith('zh'));
  if (zhVoice) u.voice = zhVoice;
  synth.speak(u);
}
function stopSpeak() { if (synth.speaking) synth.cancel(); }

function renderScene() {
  const el = document.getElementById('scene');
  document.getElementById('stepInfo').textContent = `${Math.min(revealed+1, ITEMS.length)}/${ITEMS.length}`;
  document.getElementById('progress').innerHTML = Array.from({length:ITEMS.length}, (_,i) =>
    `<div class="dot ${i===revealed?'cur':i<revealed?'done':''}"></div>`
  ).join('');

  let html = `
    <div class="fade-in" style="padding:48px 72px;position:absolute;inset:0;">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:32px;font-weight:700;color:var(--text);margin-bottom:4px;">🍳 把 AI 系统比作做饭</div>
        <div style="font-size:16px;color:var(--text-mute);">每个概念解决一个具体问题。组合起来，就是 2026 年 AI 的全貌。</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:800px;margin:0 auto;">`;

  for (let i = 0; i < ITEMS.length; i++) {
    const item = ITEMS[i];
    if (i <= revealed) {
      html += `
        <div class="slide-up" style="display:flex;align-items:center;gap:16px;background:#fff;border:1px solid var(--rule);border-radius:12px;padding:16px 20px;animation-delay:${(i-revealed)*0.05}s;">
          <span style="font-size:34px;flex-shrink:0;">${item.icon}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:18px;font-weight:700;color:var(--accent);">${item.cn}</div>
            <div style="font-size:13px;color:var(--text);font-family:var(--font-mono);">${item.en}</div>
          </div>
          <div style="font-size:14px;color:var(--text-mute);text-align:right;flex-shrink:0;">${item.desc}</div>
        </div>`;
    } else {
      html += `
        <div style="width:100%;height:72px;background:#f0f0ee;border-radius:12px;position:relative;">
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
            <span style="font-size:24px;color:#ccc;">?</span>
          </div>
        </div>`;
    }
  }
  html += `</div>`;

  if (revealed >= ITEMS.length - 1) {
    html += `
      <div class="slide-up" style="text-align:center;margin-top:20px;padding:14px;background:var(--accent-soft);border-radius:8px;border-left:4px solid var(--accent);animation-delay:.3s;">
        <div style="font-size:18px;font-weight:600;color:var(--text);">组合起来，就是 2026 年 AI 的全貌</div>
        <div style="font-size:14px;color:var(--text-mute);margin-top:6px;line-height:1.6;">
          今天十个核心名词用做饭全讲了一遍。<br>
          下期聊 <strong>多模型组合技巧</strong>：不同 AI 怎么搭配，效率翻倍。<br>
          评论区聊聊哪个概念最让你困惑？👇
        </div>
      </div>`;
  }
  el.innerHTML = html;

  // 触发当前步的语音和字幕
  if (revealed < NARRATIONS.length && NARRATIONS[revealed]) {
    setTimeout(() => showSubtitle(SUBTITLES[revealed]), 300);
    speak(NARRATIONS[revealed]);
  }
}

function goNext() {
  if (revealed < ITEMS.length - 1) {
    revealed++;
    renderScene();
  }
}
function goPrev() {
  if (revealed > 0) {
    if (isPlaying) stopAutoPlay();
    stopSpeak();
    revealed--;
    renderScene();
  }
}

function startAutoPlay() {
  if (isPlaying) return;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ 暂停';
  document.getElementById('statusText').textContent = '自动播放中...';
  autoNext();
}
function stopAutoPlay() {
  isPlaying = false;
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  document.getElementById('playBtn').textContent = '▶ 自动播放';
  document.getElementById('statusText').textContent = '点击或按 → 逐个揭晓';
}
function autoNext() {
  if (!isPlaying) return;
  if (revealed < ITEMS.length - 1) {
    const checkSpeech = () => {
      if (!synth.speaking) {
        playTimer = setTimeout(() => {
          goNext();
          playTimer = setTimeout(autoNext, 3500);
        }, 800);
      } else {
        playTimer = setTimeout(checkSpeech, 200);
      }
    };
    checkSpeech();
  } else {
    stopAutoPlay();
    document.getElementById('statusText').textContent = '播放完毕 ✓';
    document.getElementById('playBtn').textContent = '↻ 重播';
  }
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); if (isPlaying) stopAutoPlay(); else goNext(); }
  if (e.key==='ArrowLeft'||e.key==='Backspace') { e.preventDefault(); if (isPlaying) stopAutoPlay(); stopSpeak(); goPrev(); }
});
document.getElementById('stage').addEventListener('click', () => { if (revealed < ITEMS.length-1) { if (isPlaying) stopAutoPlay(); goNext(); } });
document.getElementById('playBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (document.getElementById('playBtn').textContent.startsWith('↻')) { revealed=0; stopSpeak(); renderScene(); startAutoPlay(); return; }
  if (isPlaying) stopAutoPlay(); else startAutoPlay();
});
document.getElementById('muteBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  isMuted = !isMuted;
  if (isMuted) { stopSpeak(); document.getElementById('muteBtn').textContent = '🔇 静音'; }
  else { document.getElementById('muteBtn').textContent = '🔊 语音'; }
});

renderScene();
</script>
</body>
</html>
