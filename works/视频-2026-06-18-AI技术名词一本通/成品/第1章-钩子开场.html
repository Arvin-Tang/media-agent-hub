<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI技术名词一本通 · 第1章</title>
<style>
:root {
  --shell: #e8e8e6;
  --surface: #fafaf8;
  --surface-2: #f0f0ee;
  --text: #0a0a0a;
  --text-2: #2a2a2a;
  --text-mute: #737373;
  --text-faint: #a8a8a8;
  --rule: #e0e0e0;
  --accent: #002fa7;
  --accent-soft: rgba(0, 47, 167, 0.08);
  --accent-glow: rgba(0, 47, 167, 0.35);
  --font-display-cn: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  --font-body: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Consolas", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
body { display: flex; align-items: center; justify-content: center; font-family: var(--font-display-cn); }
.stage {
  width: min(100vw, 177.78vh); height: min(100vh, 56.25vw);
  background: var(--surface); position: relative; overflow: hidden;
  box-shadow: 0 20px 80px rgba(0,0,0,0.5);
}
.stage::after {
  content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background-image: linear-gradient(rgba(10,10,10,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,10,10,0.045) 1px, transparent 1px);
  background-size: 64px 64px;
}
.scene { position: absolute; inset: 0; z-index: 2; overflow: hidden; }

.rain { position: absolute; inset: 0; }
.rain-word {
  position: absolute; top: -40px;
  font-family: var(--font-mono); font-weight: 600; color: var(--accent);
  opacity: 0; white-space: nowrap;
  animation: drop linear infinite;
}
@keyframes drop {
  0%   { transform: translateY(-40px); opacity: 0; }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.7; }
  100% { transform: translateY(1120px); opacity: 0; }
}

.calm { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.calm-text { font-weight: 200; font-size: clamp(80px, 12vw, 240px); letter-spacing: 0.12em; color: var(--accent); text-shadow: 0 0 60px var(--accent-glow), 0 0 120px var(--accent-glow); }

.llm-wrap { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.brain { width: 140px; height: 140px; margin-bottom: 24px; }
.brain ellipse { fill: var(--accent-soft); stroke: var(--accent); stroke-width: 2; }
.brain path { stroke: var(--accent); stroke-width: 1.5; opacity: 0.5; fill: none; }
.brain circle.c1 { fill: var(--accent); opacity: 0.7; }
.brain circle.c2 { fill: var(--accent); opacity: 0.4; }
.brain line { stroke: var(--accent); stroke-width: 1; opacity: 0.35; }
.crack-wrap { display: flex; flex-direction: column; gap: 16px; width: 480px; }
.crack-item { display: flex; align-items: center; gap: 20px; opacity: 0; }
.crack-item.show { animation: crack-in 0.5s ease-out both; }
@keyframes crack-in { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
.crack-line { width: 3px; height: 48px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }
.crack-label { font-size: 24px; font-weight: 600; color: var(--text); }
.crack-desc { font-size: 16px; color: var(--text-mute); margin-top: 2px; }
.crack-num { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--accent); width: 24px; flex-shrink: 0; text-align: center; }

.fade-in { animation: fi 0.6s ease-out both; }
@keyframes fi { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

/* 控制条 */
.controls {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20;
  display: flex; gap: 12px; align-items: center; pointer-events: auto;
}
.controls button {
  background: rgba(0,0,0,0.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 8px;
  padding: 8px 20px; font-size: 14px; cursor: pointer; transition: all .2s;
  font-family: var(--font-body);
}
.controls button:hover { background: rgba(0,47,167,0.5); border-color: var(--accent); }
.controls button:disabled { opacity: 0.3; cursor: not-allowed; }
.play-indicator { font-size: 12px; color: rgba(255,255,255,0.5); margin-left: 8px; }
.subtitle-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 15;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 40px 40px 16px; text-align: center; pointer-events: none;
}
.subtitle-text {
  color: #fff; font-size: 22px; font-weight: 600;
  text-shadow: 0 0 20px rgba(0,0,0,0.8);
  opacity: 0; transition: opacity .3s;
}
.subtitle-text.show { opacity: 1; }

.progress-wrap { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: center; z-index: 10; pointer-events: none; height: 32px; }
.progress { display: flex; gap: 4px; align-items: center; opacity: 0.4; }
.progress:hover { opacity: 1; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.2s; }
.dot.cur { background: #002fa7; transform: scale(1.3); }
.dot.done { background: rgba(0,47,167,0.5); }
.step-info { position: fixed; top: 12px; right: 12px; z-index: 10; font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="scene" id="scene"></div>
</div>

<!-- 字幕条 -->
<div class="subtitle-bar">
  <div class="subtitle-text" id="subtitle"></div>
</div>

<!-- 控制条 -->
<div class="controls">
  <button id="playBtn">▶ 自动播放</button>
  <button id="muteBtn">🔊 语音</button>
  <span class="play-indicator" id="statusText">点击画面或按 → 推进</span>
</div>

<div class="progress-wrap"><div class="progress" id="progress"></div></div>
<div class="step-info" id="stepInfo">1/3</div>

<script>
const WORDS = ["RAG","Agent","MCP","LoRA","RLHF","LLM","RAG","Agent","MCP","LoRA","Fine-tuning","Function Calling","Embedding","ReAct","Multi-Agent","RLTF"];
const WEAKNESSES = [
  { num: "01", label: "知识截止日期", desc: "训练完就停在当天" },
  { num: "02", label: "幻觉", desc: "不懂也硬编答案" },
  { num: "03", label: "无法操作外部系统", desc: "不能查数据库、不能点按钮" },
];

// 每 Step 的台词和字幕
const NARRATIONS = [
  "满屏都是缩写词，RAG、Agent、MCP、LoRA、RLHF…… 学不完，根本学不完。",
  "别慌。今天一篇文章，大白话一次性讲清楚十个最常用的 AI 名词。",
  "它们背后都有一个共同的基础——大语言模型，LLM。可以把它理解成一个读了全人类知识的天才实习生。但这个实习生有三个致命弱点。"
];
const SUBTITLES = [
  "满屏缩写词，学不完，根本学不完",
  "别慌，今天一次性说清楚",
  "LLM 天才实习生，但有三个致命弱点"
];

let step = 0;
const STEPS = 3;
let isPlaying = false;
let playTimer = null;

// ─── TTS ───
let synth = window.speechSynthesis;
let isMuted = false;
let currentUtterance = null;

function speak(text) {
  if (isMuted) return;
  if (synth.speaking) synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 1.0;
  u.pitch = 1.0;
  u.volume = 1.0;
  // 尝试选一个中文声音
  const voices = synth.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) u.voice = zhVoice;
  currentUtterance = u;
  synth.speak(u);
}

function stopSpeak() {
  if (synth.speaking) synth.cancel();
}

// 先触发一次 voices 加载（Chrome 需要）
synth.getVoices();

// ─── 字幕 ───
function showSubtitle(text) {
  const el = document.getElementById('subtitle');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}
function hideSubtitle() {
  document.getElementById('subtitle').classList.remove('show');
}

// ─── 渲染 ───
function renderScene() {
  const el = document.getElementById('scene');
  document.getElementById('stepInfo').textContent = `${step+1}/${STEPS}`;

  if (step === 0) {
    const r = document.querySelector('.rain');
    if (r) { el.innerHTML = '<div class="rain"></div>'; }
    else { el.innerHTML = '<div class="rain"></div>'; }
    const rain = el.querySelector('.rain');
    for (let i = 0; i < WORDS.length; i++) {
      const left = 5 + Math.random() * 90;
      const delay = Math.random() * 2.5;
      const duration = 3 + Math.random() * 4;
      const size = 20 + Math.random() * 28;
      const span = document.createElement('span');
      span.className = 'rain-word';
      span.style.cssText = `left:${left}%;font-size:${size}px;animation-delay:${delay}s;animation-duration:${duration}s`;
      span.textContent = WORDS[i];
      rain.appendChild(span);
    }
    setTimeout(() => showSubtitle(SUBTITLES[0]), 200);
    speak(NARRATIONS[0]);
  } else if (step === 1) {
    el.innerHTML = '<div class="calm"><div class="calm-text fade-in">别慌</div></div>';
    setTimeout(() => showSubtitle(SUBTITLES[1]), 200);
    speak(NARRATIONS[1]);
  } else if (step === 2) {
    let html = `<div class="llm-wrap fade-in">
      <svg class="brain" viewBox="0 0 120 120">
        <ellipse cx="60" cy="55" rx="45" ry="38"/>
        <path d="M60 17 Q38 30 38 55 Q38 80 60 93"/>
        <path d="M60 17 Q82 30 82 55 Q82 80 60 93"/>
        <circle class="c1" cx="40" cy="45" r="4"/><circle class="c1" cx="80" cy="45" r="4"/>
        <circle class="c1" cx="60" cy="35" r="3"/><circle class="c1" cx="46" cy="65" r="3"/>
        <circle class="c1" cx="74" cy="65" r="3"/>
        <line x1="40" y1="45" x2="60" y2="35"/><line x1="80" y1="45" x2="60" y2="35"/>
        <line x1="40" y1="45" x2="46" y2="65"/><line x1="80" y1="45" x2="74" y2="65"/>
      </svg>
      <div class="crack-wrap">`;
    for (let i = 0; i < WEAKNESSES.length; i++) {
      const w = WEAKNESSES[i];
      html += `<div class="crack-item" data-idx="${i}">
        <span class="crack-num">${w.num}</span>
        <div class="crack-line"></div>
        <div><div class="crack-label">${w.label}</div><div class="crack-desc">${w.desc}</div></div>
      </div>`;
    }
    html += '</div></div>';
    el.innerHTML = html;
    for (let i = 0; i < WEAKNESSES.length; i++) {
      setTimeout(() => {
        const items = el.querySelectorAll('.crack-item');
        if (items[i]) items[i].classList.add('show');
      }, 300 + i * 500);
    }
    setTimeout(() => showSubtitle(SUBTITLES[2]), 200);
    speak(NARRATIONS[2]);
  }
}

function renderDots() {
  const p = document.getElementById('progress');
  let html = '';
  for (let i = 0; i < STEPS; i++) {
    const cls = i === step ? 'dot cur' : (i < step ? 'dot done' : 'dot');
    html += `<div class="${cls}"></div>`;
  }
  p.innerHTML = html;
}

function goNext() {
  if (step < STEPS - 1) { step++; renderScene(); renderDots(); }
}
function goPrev() {
  if (step > 0) { step--; renderScene(); renderDots(); }
}

// ─── 自动播放 ───
function startAutoPlay() {
  if (isPlaying) return;
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸ 暂停';
  document.getElementById('statusText').textContent = '自动播放中...';
  autoNext();
}
function stopAutoPlay() {
  isPlaying = false;
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  document.getElementById('playBtn').textContent = '▶ 自动播放';
  document.getElementById('statusText').textContent = '点击画面或按 → 推进';
}
function autoNext() {
  if (!isPlaying) return;
  if (step < STEPS - 1) {
    // 等待当前语音说完再进
    const checkSpeech = () => {
      if (!synth.speaking) {
        // 语音说完后等一会儿，让用户看到画面
        playTimer = setTimeout(() => {
          goNext();
          // step 0 最长，等 6s；其余等 4s
          const waitMs = step === 0 ? 6000 : (step === 1 ? 5000 : 7000);
          playTimer = setTimeout(autoNext, waitMs);
        }, 1200);
      } else {
        playTimer = setTimeout(checkSpeech, 200);
      }
    };
    checkSpeech();
  } else {
    // 最后一步
    stopAutoPlay();
    document.getElementById('statusText').textContent = '播放完毕 ✓';
    document.getElementById('playBtn').textContent = '↻ 重播';
  }
}

// ─── 事件 ───
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (isPlaying) stopAutoPlay(); else goNext(); }
  if (e.key === 'ArrowLeft' || e.key === 'Backspace') { e.preventDefault(); if (isPlaying) stopAutoPlay(); goPrev(); }
});
document.getElementById('stage').addEventListener('click', () => { if (step < STEPS-1) { if (isPlaying) stopAutoPlay(); goNext(); } });

document.getElementById('playBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (document.getElementById('playBtn').textContent.startsWith('↻')) {
    step = 0; renderScene(); renderDots(); startAutoPlay(); return;
  }
  if (isPlaying) stopAutoPlay(); else startAutoPlay();
});

document.getElementById('muteBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  isMuted = !isMuted;
  if (isMuted) { stopSpeak(); document.getElementById('muteBtn').textContent = '🔇 静音'; }
  else { document.getElementById('muteBtn').textContent = '🔊 语音'; }
});

renderScene();
renderDots();
</script>
</body>
</html>
